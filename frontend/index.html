<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum | Task Board</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="script.js" defer></script>
</head>
<body>
  <main>
    <nav>
      <h1 class="brand">Momentum</h1>

      <div class="nav-actions">
        <div class="user-chip" id="user-chip">
          <span id="welcome-user">Welcome</span>
          <button type="button" id="logout-btn">Logout</button>
        </div>

        <button type="button" id="open-trash">Recycle Bin <span id="trash-count">0</span></button>
        <button type="button" id="toggle-modal">Add New Task</button>
      </div>
    </nav>

    <section class="board">
      <div id="todo" class="task-col" data-status="todo">
        <div class="heading">
          <div class="column-title"><span class="status-dot todo-dot"></span>To Do</div>
          <div class="column-count" id="todo-count">0</div>
        </div>
        <div class="task-list" id="todo-list"></div>
      </div>

      <div id="progress" class="task-col" data-status="progress">
        <div class="heading">
          <div class="column-title"><span class="status-dot progress-dot"></span>In Progress</div>
          <div class="column-count" id="progress-count">0</div>
        </div>
        <div class="task-list" id="progress-list"></div>
      </div>

      <div id="done" class="task-col" data-status="done">
        <div class="heading">
          <div class="column-title"><span class="status-dot done-dot"></span>Done</div>
          <div class="column-count" id="done-count">0</div>
        </div>
        <div class="task-list" id="done-list"></div>
      </div>
    </section>
  </main>

  <div class="modal add-new-task" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-bg"></div>

    <form class="modal-card" id="task-form">
      <h2 id="modal-title">Add Task</h2>

      <label for="task-title-input">Task title</label>
      <input type="text" id="task-title-input" placeholder="Task Title" autocomplete="off" />

      <label for="task-desc-input">Task description</label>
      <textarea id="task-desc-input" placeholder="Task Description"></textarea>

      <button type="submit" id="add-new-task">Add New Task</button>
    </form>
  </div>

  <div class="modal trash-modal" role="dialog" aria-modal="true" aria-labelledby="trash-title">
    <div class="trash-bg"></div>

    <div class="modal-card trash-card">
      <div class="trash-header">
        <h2 id="trash-title">Recycle Bin</h2>
        <button type="button" id="close-trash">Close</button>
      </div>

      <div class="trash-list" id="trash-list"></div>
    </div>
  </div>

  <div class="toast" id="toast">
    <span id="toast-message">Task deleted</span>
    <button type="button" id="undo-delete">Undo</button>
  </div>

  <div class="modal login-modal" role="dialog" aria-modal="true" aria-labelledby="login-title">
    <div class="login-bg"></div>

    <form class="modal-card" id="login-form">
      <h2 id="login-title">Welcome to Momentum</h2>

      <label for="login-name">Your name</label>
      <input type="text" id="login-name" placeholder="Enter your name" autocomplete="name" />

      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />

      <button type="submit">Continue</button>
    </form>
  </div>
</body>
</html>
